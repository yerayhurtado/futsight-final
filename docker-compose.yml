services:
  web:
    build:
      context: ./futsight-web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/dev.db
      - AGENT_API_URL=http://agent:8000
      - PREDICTION_API_URL=http://prediction:8001
      - RECOMMENDER_API_URL=http://recommender:8002
    command: npm run dev
    volumes:
      - ./futsight-web:/app
      - /app/node_modules
      - /app/.next
      - ./dev.db:/app/dev.db
    depends_on:
      - agent
      - prediction
      - recommender

  agent:
    build:
      context: ./futsigh_agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - PYTHONUNBUFFERED=1
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./futsigh_agent:/app
      - ./dev.db:/app/dev.db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prediction:
    build:
      context: ./prediction-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./prediction-service:/app
      - ./dev.db:/app/dev.db
    environment:
      - PYTHONUNBUFFERED=1

  recommender:
    build:
      context: ./recommender-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./recommender-service:/app
      - ./dev.db:/app/dev.db
    environment:
      - PYTHONUNBUFFERED=1
