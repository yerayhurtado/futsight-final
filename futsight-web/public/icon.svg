<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="36" height="36" rx="10" fill="url(#logoGrad)" />
  <!-- Campo de fútbol simplificado -->
  <rect x="6" y="10" width="24" height="16" rx="2" fill="none" stroke="white" stroke-opacity="0.9" stroke-width="1.5"/>
  <!-- Línea central -->
  <line x1="18" y1="10" x2="18" y2="26" stroke="white" stroke-opacity="0.9" stroke-width="1.5"/>
  <!-- Círculo central -->
  <circle cx="18" cy="18" r="3.5" fill="none" stroke="white" stroke-opacity="0.9" stroke-width="1.5"/>
  <!-- Punto central -->
  <circle cx="18" cy="18" r="1" fill="white"/>
  <!-- Área izquierda -->
  <rect x="6" y="13.5" width="5" height="9" rx="1" fill="none" stroke="white" stroke-opacity="0.7" stroke-width="1"/>
  <!-- Área derecha -->
  <rect x="25" y="13.5" width="5" height="9" rx="1" fill="none" stroke="white" stroke-opacity="0.7" stroke-width="1"/>
</svg>
